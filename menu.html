{% load static %}

{% url 'home' as home_url %}


<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Cluckin Chicken{% endblock %}</title>
    <!-- Favicon Icon links -->
    <link rel="apple-touch-icon" sizes="180x180" href="assets/images/favicon_io/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicon_io/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/images/favicon_io/favicon-16x16.png">
    <link rel="manifest" href="assets/images/favicon_io/site.webmanifest">
    <!-- Bootstrap CSS link -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!-- Custom CSS link -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

<body>
    <!-- Header -->
    <header>
        <!-- Collapsible menu from Tablet 768px and lower (Bootstrap)-->
        <nav class="navbar navbar-expand-md navbar-dark bg-danger">
            <div class="container">
                <a class="navbar-brand text-warning fw-bold" href="/">
                    <!-- Logo from favicon file -->
                    <img src="assets/images/favicon_io/favicon-32x32.png" alt="Logo" width="30" height="24"
                        class="d-inline-block align-text-top">
                    Cluckin Chicken
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <!-- Links are to the right side allowing more infromation spread out across navbar -->
                    <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                        <li class="nav-item">
                            <a class="nav-link active" aria-current="page" href="/">Home</a>
                        </li>
                        <div class="vr"></div>
                        <li class="nav-item">
                            <a class="nav-link" href="/menu/">Menu</a>
                        </li>
                        <div class="vr"></div>
                        <li class="nav-item">
                            <a class="nav-link" href="/booking/">Booking</a>
                        </li>
                        <div class="vr"></div>
                        <li class="nav-item">
                            <a class="nav-link" href="contact_us.html">Contact Us</a>
                        </li>
                </div>
            </div>
        </nav>
    </header>
    <!-- Main -->
    <main class="container py-4">
        <hero>

        </hero>
    {% block content %}{% endblock %}
    </main>
    <!-- Footer -->
    <footer  class="bg-dark text-white text-center p-3">
    © Cluckin Chicken

    </footer>

    <!-- Font Awesome Kit -->
    <script src="https://kit.fontawesome.com/aa80f5b7e4.js" crossorigin="anonymous"></script>
    <!-- Bootstap JS File -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous">
    </script>
</body>

</html>
